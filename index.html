<!DOCTYPE html>
<html>
    <head>
        <title>Assignment</title>
        <meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1">
        <style>
            @font-face {
                font-family: 'OngleipParkDahyeon';
                src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2') format('woff2');
                font-weight: normal;
                font-display: swap;
            }
            body {
                background: linear-gradient(45deg, #3b67  9e 0%,#2b88d9 50%,#207cca 51%,#7db9e8 100%);
                font-family: 'OngleipParkDahyeon', sans-serif;
            }
            h1 { 
                text-align: center; 

            }

            p {
                text-align: center;
                font-size: 1.2em;
            }
            
            .box { 
                border-radius: 20px; 
                background: linear-gradient(135deg, #fceabb 0%,#fccd4d 50%,#f8b500 51%,#fbdf93 100%);
                max-width: 640px;
                min-width: 104px;
                margin: 40px auto;
                padding: 20px 80px;
                
            }

            .name {
                font-size: 0.8em;
                /* text-align: right; */
                color: #666;
            }

            @media screen and (max-width: 480px) {
                h1 { font-size: 1.5em; text-align: center; }
                p { font-size: 1em; text-align: center; }
                .box { padding: 10px 80px; }
            }

        </style>
    </head>
    <body>
        <div class="box">
            <h1>풀꽃</h1>
            <p class="name">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;나태주</p>
            <p>자세히 보아야<br>예쁘다<br>오래 보아야<br>사랑스럽다<br>너도 그렇다</p>
        </div>
    </body>
</html>
